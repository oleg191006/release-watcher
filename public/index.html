<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Release Notificator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="header">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69C6.73 19.91 6.14 17.97 6.14 17.97c-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.93 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85.004 1.71.11 2.51.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.16.59.67.5A10.013 10.013 0 0 0 22 12c0-5.52-4.48-10-10-10z"
        />
      </svg>
      <h1>GitHub Release Notificator</h1>
      <p>
        Subscribe to email notifications about new releases from your favorite
        GitHub repositories
      </p>
    </div>

    <div class="card card-tabs">
      <div class="tabs">
        <div class="tab active" data-panel="subscribe-panel">📬 Subscribe</div>
        <div class="tab" data-panel="my-subs-panel">📋 My Subscriptions</div>
      </div>
    </div>

    <div class="card card-panel panel active" id="subscribe-panel">
      <form id="subscribe-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            placeholder="user@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="repo">GitHub repository</label>
          <input type="text" id="repo" placeholder="owner/repo" required />
          <div class="hint">
            For example: <strong>facebook/react</strong>,
            <strong>nodejs/node</strong>, <strong>golang/go</strong>
          </div>
        </div>
        <details class="api-key-group form-group">
          <summary>API Key (if needed)</summary>
          <input type="password" id="api-key" placeholder="Your X-API-Key" />
        </details>
        <button type="submit" class="btn btn-primary" id="subscribe-btn">
          Subscribe
        </button>
        <div class="alert" id="subscribe-alert"></div>
      </form>
    </div>

    <div class="card card-panel panel" id="my-subs-panel">
      <form id="lookup-form" autocomplete="off">
        <div class="form-group">
          <label for="lookup-email">Email address</label>
          <input
            type="email"
            id="lookup-email"
            placeholder="user@example.com"
            required
          />
        </div>
        <details class="api-key-group form-group">
          <summary>API Key (if needed)</summary>
          <input
            type="password"
            id="lookup-api-key"
            placeholder="Your X-API-Key"
          />
        </details>
        <button type="submit" class="btn btn-primary" id="lookup-btn">
          Show Subscriptions
        </button>
        <div class="alert" id="lookup-alert"></div>
      </form>
      <ul class="sub-list" id="sub-list"></ul>
    </div>

    <div class="footer">
      <p>
        Powered by <a href="https://github.com" target="_blank">GitHub API</a> ·
      </p>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
