databases:
  - name: notificator-db
    plan: free
    databaseName: notificator
    user: notificator

services:
  - type: web
    name: notificator
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: notificator-db
          property: connectionString
      - key: APP_URL
        value: https://notificator.onrender.com
      - key: API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_REJECT_UNAUTHORIZED
        value: "true"
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: SMTP_GREETING_TIMEOUT_MS
        value: "10000"
      - key: SMTP_SOCKET_TIMEOUT_MS
        value: "15000"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "GitHub Notificator <noreply@notificator.app>"
      - key: SCAN_CRON
        value: "*/10 * * * *"
